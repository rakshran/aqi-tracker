<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="AQI Tracker">
  <rect width="64" height="64" rx="12" fill="#FDFBF7"/>
  <!-- baseline -->
  <line x1="12" y1="50" x2="52" y2="50" stroke="#E5E5E5" stroke-width="2" stroke-linecap="round"/>
  <!-- declining pollution trend line -->
  <polyline points="12,20 24,32 36,28 44,40 52,44"
            fill="none" stroke="#1A1A1A" stroke-width="3.5"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- intervention milestone marker -->
  <path d="M36 22 l4 6 -4 6 -4 -6 z" fill="#F2C94C" stroke="#1A1A1A" stroke-width="1.5"/>
</svg>
